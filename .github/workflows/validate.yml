name: Validate Data Package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install frictionless pandas

      - name: Validate Data Package descriptor
        run: frictionless validate datapackage.json

      - name: Run validation scripts
        run: |
          # Min entry counts
          python scripts/check_min_entries.py data/adjectives.csv 120
          python scripts/check_min_entries.py data/colors.csv 50
          python scripts/check_min_entries.py data/animals.csv 100
          python scripts/check_min_entries.py data/celestial.csv 50
          python scripts/check_min_entries.py data/nature.csv 50
          python scripts/check_min_entries.py data/science.csv 50
          python scripts/check_min_entries.py data/numbers.csv 100

          # Uniqueness, encoding, and no empty values
          for f in data/*.csv; do
            python scripts/check_encoding.py "$f"
            python scripts/check_duplicates.py "$f"
          done

      - name: Check for problematic combinations
        run: |
          pip install requests
          python scripts/check_combinations.py \
            adjectives:data/adjectives.csv \
            colors:data/colors.csv \
            animals:data/animals.csv \
            celestial:data/celestial.csv \
            nature:data/nature.csv \
            science:data/science.csv
